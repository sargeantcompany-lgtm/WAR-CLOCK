version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: war-clock-postgres
    environment:
      POSTGRES_DB: war_clock
      POSTGRES_USER: war_clock
      POSTGRES_PASSWORD: war_clock
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
